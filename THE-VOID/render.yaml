services:
  - type: web
    name: THE_VOID-reference
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: wallpapers
      - key: SUPABASE_PROFILE_BUCKET
        value: profile-pics
      - key: THE_VOID_ADMIN_PASSWORD
        sync: false
      - key: THE_VOID_IP_HASH_SECRET
        sync: false
      - key: THE_VOID_AUTO_SYNC_STORAGE
        value: true
      - key: THE_VOID_ENFORCE_ONE_ACCOUNT_PER_IP
        value: true
